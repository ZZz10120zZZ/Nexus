  <rect width="1200" height="420" fill="url(#bg)"/>

  <g stroke="#2c7860" stroke-opacity="0.22" stroke-width="1.2" fill="none">
    <path d="M150 300 L300 150 L470 250 L300 150 L250 70"/>
    <path d="M470 250 L600 120 L760 200"/>
    <path d="M760 200 L920 110 L1050 240 L920 110 L990 60"/>
    <path d="M600 120 L600 60"/>
