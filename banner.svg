  </g>
  <g fill="#3a8350" fill-opacity="0.55">
    <circle cx="150" cy="300" r="4.5"/>
    <circle cx="470" cy="250" r="4.5"/>
    <circle cx="250" cy="70" r="3.5"/>
    <circle cx="760" cy="200" r="4.5"/>
    <circle cx="920" cy="110" r="4.5"/>
    <circle cx="1050" cy="240" r="4.5"/>
    <circle cx="990" cy="60" r="3.5"/>
    <circle cx="600" cy="60" r="3.5"/>
    <circle cx="330" cy="330" r="3.5"/>
