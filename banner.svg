  <text x="600" y="232" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="13" fill="#8c8475">N E X U S</text>
  <text x="600" y="232" text-anchor="middle" font-family="Georgia, serif" font-size="0" fill="none"></text>

  <text x="600" y="300" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="23" fill="#3f3a32">Where questions are not answered, but grown.</text>
  <text x="600" y="338" text-anchor="middle" font-family="Georgia, serif" font-size="15" letter-spacing="6" fill="#b07f28">問 い を 育 て る 観 察 環 境</text>

  <line x1="520" y1="258" x2="680" y2="258" stroke="#2c7860" stroke-opacity="0.45" stroke-width="1.4"/>
