:root{

}

.nx-root[data-theme="paper"] .nx-long{ background:linear-gradient(120deg, rgba(44,120,96,.08), var(--panel2) 60%); border-color:rgba(44,120,96,.22); }
.nx-root[data-theme="paper"] .nx-card--continue{ background:linear-gradient(160deg, rgba(44,120,96,.10), var(--panel) 60%); border-color:rgba(44,120,96,.26); }

.nx-root[data-size="s"]{ font-size:14px; } .nx-root[data-size="m"]{ font-size:15.5px; } .nx-root[data-size="l"]{ font-size:17px; }

*{ box-sizing:border-box; }
.nx-root{ position:relative; min-height:100vh; width:100%; color:var(--ink);
  font-family:'Zen Kaku Gothic New', system-ui, sans-serif;
  background:radial-gradient(120% 80% at 50% -10%, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%); overflow:hidden; }
.serif{ font-family:'Shippori Mincho B1', serif; font-weight:500; }
.nx-stars{ position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; }
.nx-shell{ position:relative; z-index:1; max-width:560px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
.nx-main{ flex:1; overflow-y:auto; padding-bottom:86px; }
.nx-page{ padding:22px 20px 8px; animation:rise .45s ease both; }
@keyframes rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

.nx-splash{ position:relative; z-index:1; height:100vh; display:flex; align-items:center; justify-content:center; }
.nx-orb{ width:26px; height:26px; border-radius:50%; background:radial-gradient(circle at 35% 30%, #fff, var(--c-q) 55%, transparent 72%); box-shadow:0 0 20px 4px rgba(243,194,101,.45); animation:pulse 2.4s ease-in-out infinite; }
.nx-orb.sm{ width:16px; height:16px; box-shadow:0 0 12px 2px rgba(243,194,101,.45); }
@keyframes pulse{ 0%,100%{transform:scale(1);opacity:.85;} 50%{transform:scale(1.12);opacity:1;} }

.nx-head{ display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:18px; }
.nx-brand{ display:flex; align-items:center; gap:8px; font-family:'Shippori Mincho B1',serif; letter-spacing:.18em; font-size:17px; }
.nx-kicker{ letter-spacing:.28em; font-size:10.5px; color:var(--ink-faint); margin:0 0 3px; }
.nx-h1{ font-size:27px; margin:0; letter-spacing:.04em; }
.nx-icon{ background:rgba(127,127,127,.08); border:1px solid var(--line); border-radius:9px; padding:7px; color:var(--ink-dim); cursor:pointer; display:flex; }

/* empty home */
.nx-empty-home{ text-align:center; padding:60px 8px; animation:rise .8s ease both; }
.nx-empty-q{ font-size:24px; line-height:1.6; margin:18px 0 26px; }
.nx-empty-foot{ margin-top:26px; color:var(--ink-faint); font-size:13px; }

/* cards */
.nx-card{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px; backdrop-filter:blur(8px); }
.nx-card--redis{ background:linear-gradient(160deg, rgba(195,155,242,.10), var(--panel) 60%); border-color:rgba(195,155,242,.24); }
.nx-card-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; }
.nx-tag{ display:inline-flex; align-items:center; gap:5px; font-size:11px; letter-spacing:.05em; }
.nx-date{ font-size:11.5px; color:var(--ink-faint); }
.nx-redis-q{ font-size:20px; line-height:1.5; margin:2px 0 12px; }
.nx-card-actions{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.nx-redis-note{ font-size:11.5px; color:var(--ink-faint); }

.nx-stats2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
.nx-stat-big{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px 14px; text-align:left; cursor:pointer; backdrop-filter:blur(8px); transition:.2s; }
.nx-stat-big:hover{ border-color:var(--accent); }
.nx-stat-n{ display:block; font-family:'Shippori Mincho B1',serif; font-size:40px; line-height:1; }
.nx-stat-l{ display:block; font-size:12px; color:var(--ink-dim); margin-top:8px; }

.nx-block{ margin-bottom:16px; } .nx-block-l{ font-size:12px; color:var(--ink-faint); margin:0 0 9px; letter-spacing:.06em; }
.nx-tags{ display:flex; flex-wrap:wrap; gap:8px; } .nx-tags.sm{ margin-top:10px; }
.nx-tag-pill{ display:inline-flex; align-items:center; gap:4px; background:rgba(127,127,127,.07); border:1px solid var(--line); border-radius:20px; padding:6px 12px; color:var(--ink-dim); font:inherit; font-size:12.5px; cursor:pointer; transition:.2s; }
.nx-tag-pill.on{ background:rgba(243,194,101,.14); border-color:var(--accent); color:var(--accent); }
.nx-tag-pill.static{ cursor:default; }
.nx-tag-n{ background:rgba(127,127,127,.14); border-radius:10px; padding:1px 7px; font-size:11px; }

.nx-quick{ display:flex; align-items:center; justify-content:center; gap:7px; width:100%; padding:14px; border:1px dashed var(--line); border-radius:13px; background:rgba(127,127,127,.04); color:var(--ink-dim); font:inherit; font-size:14px; cursor:pointer; transition:.2s; }
.nx-quick:hover{ border-color:var(--accent); color:var(--accent); }
.nx-principle{ font-size:11.5px; line-height:1.9; color:var(--ink-faint); text-align:center; margin:28px 0 10px; }

/* buttons / inputs */
.nx-btn-primary{ display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:20px; padding:15px; border:none; border-radius:13px; cursor:pointer; font:inherit; font-size:15px; font-weight:700; letter-spacing:.04em; background:linear-gradient(100deg, var(--accent), #e8a93f); color:#1a1304; transition:.18s; }
.nx-btn-primary.sm{ margin-top:10px; padding:11px; font-size:14px; }
.nx-btn-primary:hover{ transform:translateY(-1px); } .nx-btn-primary:disabled{ opacity:.35; transform:none; cursor:default; }
.nx-btn-ghost{ display:inline-flex; align-items:center; gap:6px; background:rgba(127,127,127,.05); border:1px solid var(--line); border-radius:11px; padding:9px 14px; color:var(--ink-dim); cursor:pointer; font:inherit; font-size:13px; transition:.2s; }
.nx-btn-ghost.wide{ width:100%; justify-content:center; padding:13px; } .nx-btn-ghost:hover{ color:var(--ink); border-color:var(--c-h); }
.nx-btn-group{ display:flex; flex-direction:column; gap:9px; }
.nx-btn-ghost.subtle{ background:transparent; color:var(--ink-faint); } .nx-btn-ghost.subtle:hover{ color:var(--ink-dim); border-color:var(--ink-faint); }
.nx-btn-text{ background:none; border:none; color:var(--c-h); font:inherit; font-size:12.5px; cursor:pointer; padding:6px 0; }
.nx-btn-mini{ background:var(--c-h); border:none; color:#06222a; border-radius:9px; padding:9px 14px; font:inherit; font-size:13px; cursor:pointer; font-weight:700; }
.nx-btn-mini.ghost{ background:rgba(127,127,127,.1); color:var(--ink-dim); }
.nx-input{ width:100%; background:rgba(127,127,127,.05); border:1px solid var(--line); border-radius:12px; padding:13px 15px; color:var(--ink); font:inherit; font-size:15px; outline:none; transition:border .2s; resize:none; }
.nx-input.lg{ font-size:19px; } .nx-input:focus{ border-color:var(--accent); }
.nx-label{ display:block; font-size:12px; color:var(--ink-dim); margin:16px 0 7px; }
.nx-faint{ color:var(--ink-faint); font-size:12px; } .nx-faint.center{ text-align:center; margin-top:12px; }

.nx-type-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.nx-type-b{ display:flex; align-items:center; justify-content:center; gap:6px; padding:11px 6px; border:1px solid var(--line); border-radius:11px; background:rgba(127,127,127,.04); color:var(--ink-dim); font:inherit; font-size:13px; cursor:pointer; transition:.15s; }
.nx-type-b.on{ background:rgba(127,127,127,.08); }

/* topbar / menu */
.nx-topbar{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.nx-back{ background:rgba(127,127,127,.06); border:1px solid var(--line); border-radius:10px; padding:8px; color:var(--ink); cursor:pointer; display:flex; }
.nx-topbar-t{ font-size:13px; color:var(--ink-dim); letter-spacing:.06em; }
.nx-menu{ position:absolute; right:20px; z-index:9; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:6px; backdrop-filter:blur(10px); display:flex; flex-direction:column; gap:2px; }
.nx-menu button{ display:flex; align-items:center; gap:8px; background:none; border:none; color:var(--ink-dim); font:inherit; font-size:13px; padding:9px 14px; border-radius:8px; cursor:pointer; }
.nx-menu button:hover{ background:rgba(127,127,127,.08); color:var(--ink); } .nx-menu button.danger:hover{ color:var(--c-c); }

/* search / list */
.nx-searchbar{ display:flex; align-items:center; gap:9px; background:rgba(127,127,127,.05); border:1px solid var(--line); border-radius:12px; padding:11px 14px; margin-bottom:14px; color:var(--ink-faint); }
.nx-search-i{ flex:1; background:none; border:none; outline:none; color:var(--ink); font:inherit; font-size:15px; }
.nx-list{ display:flex; flex-direction:column; gap:8px; }
.nx-list-item{ display:flex; gap:11px; align-items:center; text-align:left; width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; cursor:pointer; font:inherit; color:inherit; transition:.18s; }
.nx-list-item:hover{ border-color:var(--c-h); }
.nx-li-ic{ flex-shrink:0; } .nx-li-body{ display:flex; flex-direction:column; gap:3px; min-width:0; flex:1; }
.nx-li-t{ font-size:14.5px; line-height:1.45; } .nx-li-meta{ font-size:11px; color:var(--ink-faint); }
.nx-li-ch{ color:var(--ink-faint); flex-shrink:0; }
.nx-empty{ color:var(--ink-faint); font-size:13.5px; text-align:center; padding:14px 0; }

/* discover */
.nx-sec{ font-size:11.5px; letter-spacing:.1em; color:var(--ink-faint); margin:22px 0 11px; text-transform:uppercase; }
.nx-long{ display:flex; align-items:center; justify-content:space-between; gap:12px; width:100%; text-align:left; background:linear-gradient(120deg, rgba(243,194,101,.08), var(--panel2) 60%); border:1px solid rgba(243,194,101,.2); border-radius:13px; padding:14px 16px; cursor:pointer; font:inherit; color:inherit; }
.nx-long-t{ font-size:16px; line-height:1.4; } .nx-long-d{ font-size:12px; color:var(--ink-dim); white-space:nowrap; } .nx-long-d b{ font-family:'Shippori Mincho B1',serif; font-size:24px; color:var(--c-q); }
.nx-grow-themes{ display:flex; flex-wrap:wrap; gap:9px; }
.nx-grow-chip{ display:inline-flex; align-items:center; gap:5px; background:rgba(127,127,127,.06); border:1px solid var(--line); border-radius:20px; padding:7px 13px; font-size:13px; color:var(--ink-dim); }
.nx-grow-plus{ color:var(--c-r); font-family:'Shippori Mincho B1',serif; }
.nx-bars{ display:flex; flex-direction:column; gap:11px; }
.nx-bar-row{ display:flex; align-items:center; gap:12px; } .nx-bar-l{ width:42px; font-size:12.5px; color:var(--ink-dim); }
.nx-bar-track{ flex:1; height:9px; background:rgba(127,127,127,.08); border-radius:5px; overflow:hidden; }
.nx-bar-fill{ display:block; height:100%; border-radius:5px; transition:width .6s; }
.nx-bar-v{ width:26px; text-align:right; font-family:'Shippori Mincho B1',serif; font-size:15px; }
.nx-stat-line{ font-size:13px; color:var(--ink-dim); margin-top:14px; } .nx-stat-line b{ color:var(--ink); font-family:'Shippori Mincho B1',serif; }

/* tree */
.nx-tree{ background:radial-gradient(80% 60% at 50% 30%, rgba(120,140,180,.08), transparent); border:1px solid var(--line); border-radius:16px; padding:14px 8px; }
.nx-trow{ display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:none; border:none; color:inherit; font:inherit; padding:9px 8px; border-radius:8px; cursor:pointer; }
.nx-trow:hover{ background:rgba(127,127,127,.07); }
.nx-tbranch{ color:var(--ink-faint); font-family:monospace; flex-shrink:0; }
.nx-tdot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.nx-trow-t{ font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.nx-legend{ display:flex; flex-wrap:wrap; gap:13px; justify-content:center; margin-top:16px; }
.nx-leg{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; color:var(--ink-dim); } .nx-leg-d{ width:8px; height:8px; border-radius:50%; }

/* detail */
.nx-detail-head{ border-left:3px solid; padding:2px 0 16px 14px; margin-bottom:8px; }
