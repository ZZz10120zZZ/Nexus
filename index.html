import React, { createContext, useState, useEffect, useMemo, useCallback, useRef, useContext } from "react";

  Home, PlusCircle, Compass, Telescope, GitBranch, Settings as Cog,

// ===== constants =====
// Time constants
const DAY = 86400000;
const REDISCOVER_DAYS = 30;
const API_TIMEOUT = 10000;

// Database
const DBKEY = "nx:db:v3";

// Type definitions
const TYPES = {
  question:   { jp: "問い",     en: "Question" },
  hypothesis: { jp: "仮説",     en: "Hypothesis" },
  discovery:  { jp: "発見",     en: "Discovery" },
  conclusion: { jp: "結論",     en: "Conclusion" },
  reference:  { jp: "参考資料", en: "Reference" },
  journal:    { jp: "日記",     en: "Journal" },
};
const TYPE_ORDER = ["question", "hypothesis", "discovery", "conclusion", "reference", "journal"];

// Nexus AI system prompt
const NEXUS_SYSTEM_PROMPT = `あなたは「Nexus」。回答者ではなく観察補助者である。
原理: 問いを終わらせず広げる。答えを与えず、見落とされた関係性を示す。
良い問いとは解決される問いではなく、より良い問いへ進化する問いである。
必ず次のJSONだけを返す(前置き・コードフェンス禁止):
{"followup":"より深い一つの問い返し(20〜45字)","relations":["概念A","概念B","概念C"],"note":"関係性のひとこと(40字以内)"}
relationsは抽象度の高い名詞を3つ。日本語で。`;

// Fallback responses for Nexus AI
const NEXUS_FOLLOWUP_BANK = [
  "それが広がるとき、何が縮んでいるのか？",
  "この問いを逆さに置くと何が見えるか？",
  "最も疑っていない前提はどれか？",
  "観測する自分は内か外か？",
  "この現象に時間は本当に必要か？",
  "境界は誰がいつ引いたのか？"
];
const NEXUS_RELATION_BANK = [
  ["時間","情報","エントロピー"],
  ["観測","境界","尺度"],
  ["秩序","対称性","確率"],
  ["記憶","再帰","変化"],
  ["空間","関係","場"]
];
const NEXUS_NOTE_BANK = [
  "別の問いと根が触れているかもしれません。",
  "これは定義より関係の問いに見えます。",
  "過去の発見と再会させると形が変わりそうです。"
];

// Theme colors
const COLORS = {
  question:   "var(--c-q)",
  hypothesis: "var(--c-h)",
  discovery:  "var(--c-d)",
  conclusion: "var(--c-c)",
  reference:  "var(--c-r)",
  journal:    "var(--c-j)",
};

// Stop words for tokenization
const STOP_WORDS = new Set([
  "の","は","が","を","に","と","で","も","な","か",
  "する","こと","とは","なぜ","から","まで","ため","よう",
  "この","その","あの","それ","これ"
]);

// ===== helpers =====
const uid = (p = "n") => p + "_" + Math.random().toString(36).slice(2, 9);
const nowISO = () => new Date().toISOString();
const daysSince = (iso) => Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / DAY));
const fmtDate = (iso) => {
  const d = new Date(iso);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
};
const trunc = (s, n = 14) => (s.length > n ? s.slice(0, n) + "…" : s);
const pick = (a) => a[Math.floor(Math.random() * a.length)];
const pairKey = (a, b) => [a, b].sort().join("|");
const tokens = (note) => {
  const set = new Set(note.tags.map(t => t.toLowerCase()));
  ((note.title || "") + " " + (note.content || "")).toLowerCase()
    .split(/[\s、。！？!?,.\/()\[\]「」『』:：;；・\-]+/).filter(Boolean)
    .forEach(p => { if (p.length >= 2 && !STOP_WORDS.has(p)) set.add(p); });
  return set;
};
const emptyDB = () => ({
  notes: [], tags: [], links: [], chains: [],
  settings: { theme: "observatory", fontSize: "m", font: "gothic" },
});

// ===== persistence (localStorage) =====
const persistence = {
  async load() {
    try {
      const raw = (typeof window !== "undefined" && window.localStorage) ? window.localStorage.getItem(DBKEY) : null;
      if (raw) return JSON.parse(raw);
    } catch (e) { console.error("load failed", e); }
    return null;
  },
  async save(db) {
    try {
      if (typeof window !== "undefined" && window.localStorage) window.localStorage.setItem(DBKEY, JSON.stringify(db));
    } catch (e) { console.error("save failed", e); }
  },
};

// ===== discoveryEngine =====
const activeNotes = (db) => db.notes.filter(n => n.status === "active");
const noteById = (db, id) => db.notes.find(n => n.id === id);
const outLinks = (db, id) => db.links.filter(l => l.sourceId === id).map(l => noteById(db, l.targetId)).filter(Boolean);
const backLinks = (db, id) => db.links.filter(l => l.targetId === id).map(l => noteById(db, l.sourceId)).filter(Boolean);
const chainOf = (db, questionId) => db.chains.find(c => c.questionId === questionId);
const relatedByTag = (db, note) =>
  activeNotes(db).filter(n => n.id !== note.id && n.tags.some(t => note.tags.includes(t)));
const unsolvedQuestions = (db) =>
  activeNotes(db)
    .filter(n => n.type === "question")
    .filter(n => {
      const c = chainOf(db, n.id);
      return !c || c.conclusionIds.length === 0;
    });
function statistics(db) {
  const a = activeNotes(db);
  const c = {};
  TYPE_ORDER.forEach(t => c[t] = a.filter(n => n.type === t).length);
  return { ...c, tags: db.tags.length, links: db.links.length, total: a.length };
}
function recentThemes(db, limit = 5) {
  const recent = [...activeNotes(db)].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt)).slice(0, 12);
  const seen = [];
  recent.forEach(n => n.tags.forEach(t => { if (!seen.includes(t)) seen.push(t); }));
  return seen.slice(0, limit);
}
function growthThemes(db) {
  const counts = {};
  activeNotes(db)
    .filter(n => daysSince(n.createdAt) <= REDISCOVER_DAYS)
    .forEach(n => n.tags.forEach(t => counts[t] = (counts[t] || 0) + 1));
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 4);
}
function continueQuestion(db) {
  const qs = activeNotes(db).filter(n => n.type === "question");
  if (!qs.length) return null;
  const unsolved = unsolvedQuestions(db);
  const pool = unsolved.length ? unsolved : qs;
  return [...pool].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt))[0];
}
const recentCount = (db, type, days) =>
  activeNotes(db).filter(n => n.type === type && daysSince(n.createdAt) <= days).length;
function newDiscoveriesFor(db, qid, days = 7) {
  const c = chainOf(db, qid);
  if (!c) return 0;
  return c.discoveryIds
    .map(i => noteById(db, i))
    .filter(Boolean)
    .filter(n => daysSince(n.createdAt) <= days).length;
}
function weeklyReport(db) {
  return {
    question: recentCount(db, "question", 7),
    hypothesis: recentCount(db, "hypothesis", 7),
    discovery: recentCount(db, "discovery", 7),
    conclusion: recentCount(db, "conclusion", 7),
    links: db.links.filter(l => l.createdAt && daysSince(l.createdAt) <= 7).length,
  };
}
function relationCount(db, id) {
  const set = new Set();
  outLinks(db, id).forEach(n => set.add(n.id));
  backLinks(db, id).forEach(n => set.add(n.id));
  const note = noteById(db, id);
  if (note) relatedByTag(db, note).forEach(n => set.add(n.id));
  return set.size;
}
function parentQuestionOf(db, id) {
  const c = db.chains.find(c => c.hypothesisIds.includes(id) || c.discoveryIds.includes(id) || c.conclusionIds.includes(id));
  return c ? noteById(db, c.questionId) : null;
}
function relatedCandidates(db, limit = 5, onlyId = null) {
  const notes = activeNotes(db);
  const linked = new Set(db.links.map(l => pairKey(l.sourceId, l.targetId)));
  const cands = [];

  for (let i = 0; i < notes.length; i++) {
    for (let j = i + 1; j < notes.length; j++) {
      const a = notes[i], b = notes[j];
      if (onlyId && a.id !== onlyId && b.id !== onlyId) continue;
      if (linked.has(pairKey(a.id, b.id))) continue;

      const sharedTags = a.tags.filter(t => b.tags.includes(t));
      const A = tokens(a), B = tokens(b);
      const sharedWords = [];
      A.forEach(w => { if (B.has(w) && !sharedTags.includes(w)) sharedWords.push(w); });

      const score = sharedTags.length * 3 + sharedWords.length;
      if (score > 0) {
        cands.push({
          a, b, score,
          shared: [...new Set([...sharedTags, ...sharedWords])].slice(0, 3)
        });
      }
    }
  }

  return cands.sort((x, y) => y.score - x.score).slice(0, limit);
}
const neglectedQuestions = (db, days = REDISCOVER_DAYS) =>
  activeNotes(db)
    .filter(n => n.type === "question" && daysSince(n.updatedAt) >= days)
    .sort((a, b) => new Date(a.updatedAt) - new Date(b.updatedAt));
function maturity(db, qid) {
  const c = chainOf(db, qid);
  if (!c) return 0;
  let s = 0;
  if (c.hypothesisIds.length) s += 25;
  s += Math.min(20, c.hypothesisIds.length * 7);
  if (c.discoveryIds.length) s += 25;
  s += Math.min(15, c.discoveryIds.length * 5);
  if (c.conclusionIds.length) s += 15;
  return Math.min(100, Math.round(s));
}
function rediscoveryScore(db, note) {
  const old = daysSince(note.updatedAt);
  const rel = relationCount(db, note.id);
  const links = outLinks(db, note.id).length + backLinks(db, note.id).length;
  return old * 1.0 + rel * 2 + links * 1.5;
}
const rediscoveryList = (db, limit = 3) =>
  activeNotes(db)
    .filter(n => daysSince(n.updatedAt) >= 1)
    .map(n => ({ n, s: rediscoveryScore(db, n) }))
    .sort((a, b) => b.s - a.s)
    .slice(0, limit)
    .map(x => x.n);
function majorThemes(db, limit = 5) {
  const m = {};
  activeNotes(db).forEach(n => n.tags.forEach(t => m[t] = (m[t] || 0) + 1));
  return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, limit);
}
function structureCandidate(db) {
  const linked = new Set(db.links.map(l => pairKey(l.sourceId, l.targetId)));
  const byTag = {};

  activeNotes(db).forEach(n => {
    n.tags.forEach(t => {
      (byTag[t] = byTag[t] || []).push(n);
    });
  });

  let best = null;
  Object.entries(byTag).forEach(([tag, notes]) => {
    if (notes.length < 3) return;

    const ordered = [...notes]
      .sort((a, b) => {
        if (a.type === "question" && b.type !== "question") return -1;
        if (b.type === "question" && a.type !== "question") return 1;
        return new Date(a.createdAt) - new Date(b.createdAt);
      })
      .slice(0, 4);

    let missing = 0;
    for (let i = 0; i < ordered.length - 1; i++) {
      if (!linked.has(pairKey(ordered[i].id, ordered[i + 1].id))) {
        missing++;
      }
    }

    if (missing === 0) return;
    if (!best || missing < best.missing) {
      best = { tag, notes: ordered, missing };
    }
  });

  return best;
}
function featuredQuestion(db) {
  const qs = activeNotes(db).filter(n => n.type === "question");
  if (!qs.length) return null;
  const unsolved = unsolvedQuestions(db);
  const pool = unsolved.length ? unsolved : qs;
  const best = [...pool]
    .map(q => ({ q, s: rediscoveryScore(db, q) }))
    .sort((a, b) => b.s - a.s)[0].q;
  return { q: best, mode: daysSince(best.updatedAt) >= 7 ? "rediscover" : "continue" };
}
const tagCount = (db, tag) => activeNotes(db).filter(n => n.tags.includes(tag)).length;
function relatedTags(db, tag, limit = 3) {
  const m = {};
  activeNotes(db)
    .filter(n => n.tags.includes(tag))
    .forEach(n => n.tags.forEach(t => { if (t !== tag) m[t] = (m[t] || 0) + 1; }));
  return Object.entries(m).sort((a, b) => b[1] - a[1]).slice(0, limit).map(x => x[0]);
}
function nexusObservation(db) {
  const qs = activeNotes(db).filter(n => n.type === "question");
  if (!qs.length) return null;

  const cont = continueQuestion(db);
  const zeroHyp = qs.find(q => {
    const c = chainOf(db, q.id);
    return c && c.hypothesisIds.length === 0;
  });

  if (zeroHyp) {
    return {
      text: `「${zeroHyp.title.slice(0, 14)}」について、仮説を考えてみますか？`,
      qid: zeroHyp.id,
      cta: "仮説を考える"
    };
  }

  if (cont) {
    const nd = newDiscoveriesFor(db, cont.id, 7);
    if (nd > 0) {
      return {
        text: `「${cont.title.slice(0, 14)}」に関する新しい発見が ${nd}件 あります。`,
        qid: cont.id,
        cta: "見返す"
      };
    }
  }

  const themes = recentThemes(db, 1);
  if (themes.length) {
    return { text: `あなたは最近、${themes[0]} についてよく考えています。`, tag: themes[0] };
  }

  const longest = [...qs].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt))[0];
  if (longest && daysSince(longest.createdAt) >= 30) {
    return {
      text: `「${longest.title.slice(0, 14)}」を ${daysSince(longest.createdAt)}日 育てています。`,
      qid: longest.id,
      cta: "見返す"
    };
  }

  return { text: "問いは終着点ではなく、起点である。" };
}

// ===== api =====
class APIError extends Error {
  constructor(message, status = null) {
    super(message);
    this.name = 'APIError';
    this.status = status;
  }
}

// Endpoint of the server-side proxy (see api/nexus.js). The Anthropic API key
// is held only by the server, never exposed in the browser bundle. If this
// endpoint is unavailable (e.g. a static-only deployment), askNexus falls back
// to its built-in response banks below.
const NEXUS_ENDPOINT = '/api/nexus';
async function askNexus(focus, fragments = []) {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), API_TIMEOUT);

    const res = await fetch(NEXUS_ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ focus, fragments }),
      signal: controller.signal,
    });

    clearTimeout(timeoutId);

    if (!res.ok) {
      const errorData = await res.json().catch(() => ({}));
      throw new APIError(
        `API Error: ${res.status} - ${errorData.error || res.statusText}`,
        res.status
      );
    }

    const data = await res.json();
    const text = data.text;

    if (!text) {
      throw new APIError('Empty response from API');
    }

    const parsed = parseNexusResponse(text);
    return parsed;
  } catch (err) {
    if (err.name === 'AbortError') {
      console.warn('API request timeout after', API_TIMEOUT, 'ms');
    } else if (err instanceof APIError) {
      console.error('API Error:', err.message);
    } else {
      console.error('Unexpected error in askNexus:', err);
    }

    // Return fallback response
    return {
      followup: pick(NEXUS_FOLLOWUP_BANK),
      relations: pick(NEXUS_RELATION_BANK),
      note: pick(NEXUS_NOTE_BANK),
    };
  }
}

function parseNexusResponse(text) {
  try {
    // Remove markdown code fences if present
    const cleaned = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(cleaned);

    // Validate response schema
    if (!parsed.followup || typeof parsed.followup !== 'string') {
      throw new Error('Missing or invalid followup field');
    }

    return {
      followup: String(parsed.followup),
      relations: Array.isArray(parsed.relations)
        ? parsed.relations.slice(0, 3).map(String)
        : [],
      note: String(parsed.note || ""),
    };
  } catch (err) {
    console.warn('Failed to parse Nexus response:', err.message);
    // Return fallback
    return {
      followup: pick(NEXUS_FOLLOWUP_BANK),
      relations: pick(NEXUS_RELATION_BANK),
      note: pick(NEXUS_NOTE_BANK),
    };
  }
}

// ===== ErrorBoundary =====
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }

  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }

  componentDidCatch(error, errorInfo) {
    console.error('ErrorBoundary caught:', error, errorInfo);
  }

  render() {
    if (this.state.hasError) {
      return (
        <div style={styles.container}>
          <div style={styles.content}>
            <h2 style={styles.title}>予期しないエラーが発生しました</h2>
            <details style={styles.details}>
              <summary style={styles.summary}>エラー詳細を表示</summary>
              <pre style={styles.pre}>
                {this.state.error?.toString()}
              </pre>
            </details>
            <button
              onClick={() => window.location.reload()}
              style={styles.button}
            >
              ページを再読み込み
            </button>
          </div>
        </div>
      );
    }

    return this.props.children;
  }
}

// ===== NexusContext =====
const NexusContext = createContext(null);
function NexusProvider({ children }) {
  const [db, setDb] = useState(null);
  const [booted, setBooted] = useState(false);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);

  // Initialize DB on mount
  useEffect(() => {
    (async () => {
      try {
        setLoading(true);
        const loaded = await persistence.load();
        setDb(loaded || emptyDB());
      } catch (err) {
        console.error('Failed to load DB:', err);
        setError('データベースの読み込みに失敗しました');
        setDb(emptyDB());
      } finally {
        setBooted(true);
        setLoading(false);
      }
    })();
  }, []);

  const commit = useCallback((next) => {
    setDb(next);
    persistence.save(next).catch(err => {
      console.error('Failed to save DB:', err);
      setError('データの保存に失敗しました');
    });
  }, []);

  const updateSettings = useCallback((patch) => {
    if (!db) return;
    commit({ ...db, settings: { ...db.settings, ...patch } });
  }, [db, commit]);

  const clearError = useCallback(() => {
    setError(null);
  }, []);

  const value = {
    db,
    commit,
    booted,
    loading,
    error,
    clearError,
    updateSettings,
  };

  return (
    <NexusContext.Provider value={value}>
      {children}
    </NexusContext.Provider>
  );
}

// ===== useNexus =====
const useNexus = () => {
  const context = useContext(NexusContext);
  if (!context) {
    throw new Error('useNexus must be used within NexusProvider');
  }
  return context;
};
const useNexusSelectors = (db) => {
  return useMemo(() => {
    if (!db) return null;
    return {
      activeNotes: activeNotes(db),
      unsolvedQuestions: unsolvedQuestions(db),
      recentThemes: recentThemes(db),
      statistics: statistics(db),
      featuredQuestion: featuredQuestion(db),
      continueQuestion: continueQuestion(db),
      nexusObservation: nexusObservation(db),
      growthThemes: growthThemes(db),
      majorThemes: majorThemes(db),
      rediscoveryList: rediscoveryList(db),
      relatedCandidates: relatedCandidates(db),
      weeklyReport: weeklyReport(db),
    };
  }, [db]);
};
const useChainOf = (db, questionId) => {
  return useMemo(() => {
    if (!db) return null;
    return chainOf(db, questionId);
  }, [db, questionId]);
};

/* ============================================================ */
function NexusAlpha() {
  return (
    <ErrorBoundary>
      <NexusProvider>
        <NexusApp />
      </NexusProvider>
    </ErrorBoundary>
  );
}

function NexusApp() {
  const { db, commit, booted, loading, error, clearError, updateSettings } = useNexus();
  const [view, setView] = useState("home");
  const [detailId, setDetailId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [capturePreset, setCapturePreset] = useState("question");
  const [graphRoot, setGraphRoot] = useState(null);

  /* fonts */
  useEffect(() => {
    const l = document.createElement("link");
    l.rel = "stylesheet";
    l.href = "https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap";
    document.head.appendChild(l);
    return () => { try { document.head.removeChild(l); } catch {} };
  }, []);

  const ensureTags = (db, names) => {
    const tags = [...db.tags];
    names.forEach(n => { if (!tags.find(t => t.name === n)) tags.push({ id: uid("tag"), name: n }); });
    return tags;
  };

  const createNote = useCallback(({ title, content, type, tags }) => {
    const id = uid("note");
    const t = nowISO();
    const note = { id, title: title || "(無題)", content: content || "", type, tags: tags || [], links: [], createdAt: t, updatedAt: t, status: "active" };
    let next = { ...db, notes: [...db.notes, note], tags: ensureTags(db, note.tags) };
    if (type === "question") next = { ...next, chains: [...next.chains, { id: uid("chain"), questionId: id, hypothesisIds: [], discoveryIds: [], conclusionIds: [] }] };
    commit(next);
    return id;
  }, [db, commit]);

  const addLink = (db, sourceId, targetId, type = "related") => {
    if (db.links.find(l => l.sourceId === sourceId && l.targetId === targetId)) return db.links;
    return [...db.links, { id: uid("link"), sourceId, targetId, type, createdAt: nowISO() }];
  };

  const growChain = useCallback((questionId, type, { title, content, tags }) => {
    const id = uid("note");
    const t = nowISO();
    const note = { id, title: title || "(無題)", content: content || "", type, tags: tags || [], links: [], createdAt: t, updatedAt: t, status: "active" };
    let notes = [...db.notes, note];
    let links = addLink(db, questionId, id, "chain");
    let chains = db.chains.map(c => {
      if (c.questionId !== questionId) return c;
      if (type === "hypothesis") return { ...c, hypothesisIds: [...c.hypothesisIds, id] };
      if (type === "discovery")  return { ...c, discoveryIds: [...c.discoveryIds, id] };
      if (type === "conclusion") return { ...c, conclusionIds: [...c.conclusionIds, id] };
      return c;
    });
    commit({ ...db, notes, links, chains, tags: ensureTags(db, note.tags) });
    return id;
  }, [db, commit]);

  const addReference = useCallback((hypothesisId, text) => {
    const id = uid("note"); const t = nowISO();
    const note = { id, title: text, content: "", type: "reference", tags: [], links: [], createdAt: t, updatedAt: t, status: "active" };
    commit({ ...db, notes: [...db.notes, note], links: addLink(db, hypothesisId, id, "related") });
    return id;
  }, [db, commit]);

  const addDiscoveryConcept = useCallback((questionId, name) => {
    const id = uid("note"); const t = nowISO();
    const note = { id, title: name, content: "", type: "discovery", tags: [name], links: [], createdAt: t, updatedAt: t, status: "active" };
    let chains = db.chains.map(c => c.questionId === questionId ? { ...c, discoveryIds: [...c.discoveryIds, id] } : c);
    commit({ ...db, notes: [...db.notes, note], links: addLink(db, questionId, id, "chain"), chains, tags: ensureTags(db, [name]) });
  }, [db, commit]);

  const touchNote = useCallback((id) => {
    commit({ ...db, notes: db.notes.map(n => n.id === id ? { ...n, updatedAt: nowISO() } : n) });
  }, [db, commit]);

  const setNoteStatus = useCallback((id, status) => {
    commit({ ...db, notes: db.notes.map(n => n.id === id ? { ...n, status } : n) });
  }, [db, commit]);

  const linkNotes = useCallback((a, b) => { commit({ ...db, links: addLink(db, a, b, "related") }); }, [db, commit]);

  const linkSequence = useCallback((ids) => {
    let links = db.links;
    for (let i = 0; i < ids.length - 1; i++) {
      const a = ids[i], b = ids[i + 1];
      if (!links.find(l => (l.sourceId === a && l.targetId === b) || (l.sourceId === b && l.targetId === a)))
        links = [...links, { id: uid("link"), sourceId: a, targetId: b, type: "related", createdAt: nowISO() }];
    }
    commit({ ...db, links });
  }, [db, commit]);

  const openDetail = useCallback((id) => { setDetailId(id); setView("detail"); }, []);

  if (loading || !booted || !db) return <div className="nx-root"><Style /><div className="nx-splash"><span className="nx-orb" /></div></div>;

  const s = db.settings;
  const goCapture = (type) => { setCapturePreset(type || "question"); setView("capture"); };

  return (
    <div className="nx-root" data-theme={s.theme} data-font={s.font} data-size={s.fontSize}>
      {error && (
        <div style={{ position: 'fixed', top: 10, right: 10, zIndex: 100, background: '#c0633a', color: 'white', padding: '12px 16px', borderRadius: '8px', maxWidth: '300px' }}>
          <span>{error}</span>
          <button onClick={clearError} style={{ marginLeft: '8px', background: 'none', border: 'none', color: 'inherit', cursor: 'pointer', fontWeight: 'bold' }}>✕</button>
        </div>
      )}
      <Style />
      <Starfield show={s.theme === "observatory"} />
      <div className="nx-shell">
        <main className="nx-main">
          {view === "home" && <HomeView db={db} onOpen={openDetail} onCapture={() => goCapture("question")} onSettings={() => setShowSettings(true)} goView={setView} />}
          {view === "capture" && <CaptureView db={db} preset={capturePreset} onBack={() => setView("home")} onSaved={(id, type) => { if (type === "question") openDetail(id); else setView("home"); }} createNote={createNote} />}
          {view === "explore" && <ExploreView db={db} onOpen={openDetail} />}
          {view === "discover" && <DiscoverView db={db} onOpen={openDetail} linkNotes={linkNotes} />}
          {view === "graph" && <GraphView db={db} root={graphRoot} setRoot={setGraphRoot} onOpen={openDetail} linkSequence={linkSequence} />}
          {view === "detail" && <DetailView db={db} id={detailId} onBack={() => setView("home")} onOpen={(id) => { setDetailId(id); touchNote(id); }}
              growChain={growChain} addReference={addReference} addDiscoveryConcept={addDiscoveryConcept} createNote={createNote} linkNotes={linkNotes} setNoteStatus={setNoteStatus} />}
        </main>
        <Nav view={view} setView={setView} onCapture={() => goCapture("question")} />
      </div>
      {showSettings && <SettingsModal db={db} onClose={() => setShowSettings(false)} update={updateSettings} />}
    </div>
  );
}

// Update TYPES to include lucide icons and colors
const TYPES_FULL = {
  question:   { ...TYPES.question, jp: "問い",     en: "Question",   ic: CircleHelp,  color: COLORS.question },
  hypothesis: { ...TYPES.hypothesis, jp: "仮説",     en: "Hypothesis", ic: Lightbulb,   color: COLORS.hypothesis },
  discovery:  { ...TYPES.discovery, jp: "発見",     en: "Discovery",  ic: Stars,       color: COLORS.discovery },
  conclusion: { ...TYPES.conclusion, jp: "結論",     en: "Conclusion", ic: Flag,        color: COLORS.conclusion },
  reference:  { ...TYPES.reference, jp: "参考資料", en: "Reference",  ic: BookOpen,    color: COLORS.reference },
  journal:    { ...TYPES.journal, jp: "日記",     en: "Journal",    ic: NotebookPen, color: COLORS.journal },
};

/* ============================================================ HOME */
function HomeView({ db, onOpen, onCapture, onSettings, goView }) {
  const st = useMemo(() => statistics(db), [db]);
  const unsolved = useMemo(() => unsolvedQuestions(db).length, [db]);
  const themes = useMemo(() => recentThemes(db), [db]);
  const obs = useMemo(() => nexusObservation(db), [db]);
  const featured = useMemo(() => featuredQuestion(db), [db]);
  const empty = activeNotes(db).length === 0;
  const fChain = featured ? chainOf(db, featured.q.id) : null;

  return (
    <div className="nx-page">
      <header className="nx-head">
        <div className="nx-brand"><span className="nx-orb sm" /><span>Nexus</span></div>
        <button className="nx-icon" onClick={onSettings} aria-label="settings"><Cog size={18} /></button>
      </header>

      {empty ? (
        <div className="nx-empty-home">
          <p className="nx-kicker">N E X U S　Alpha</p>
          <p className="serif nx-empty-q">今、一番気になっていることは？</p>
          <button className="nx-btn-primary" onClick={onCapture}>最初の問いを蒔く <ArrowRight size={16} /></button>
          <p className="nx-empty-foot">問いは終着点ではなく、起点である。</p>
        </div>
      ) : (
        <>
          {/* Nexus daily observation */}
          {obs && (
            obs.qid ? (
              <button className="nx-observe" onClick={() => onOpen(obs.qid)}>
                <span className="nx-observe-orb" />
                <span className="nx-observe-t">{obs.text}</span>
                {obs.cta && <span className="nx-observe-cta">{obs.cta} <ArrowRight size={13} /></span>}
              </button>
            ) : (
              <div className="nx-observe static" onClick={() => obs.tag && goView("explore")}>
                <span className="nx-observe-orb" />
                <span className="nx-observe-t">{obs.text}</span>
              </div>
            )
          )}

          {/* ① 今日の再発見 / 続きを考える問い（統合） */}
          {featured && (
            <div className={"nx-card " + (featured.mode === "rediscover" ? "nx-card--redis" : "nx-card--continue")}>
              <div className="nx-card-row">
                {featured.mode === "rediscover"
                  ? <span className="nx-tag" style={{ color: "var(--c-d)" }}><Clock size={12} /> 今日の再発見・{daysSince(featured.q.updatedAt)}日未更新</span>
                  : <span className="nx-tag" style={{ color: "var(--c-q)" }}><CircleHelp size={12} /> 続きを考える問い</span>}
                <span className="nx-date">{fmtDate(featured.q.createdAt)}</span>
              </div>
              <p className="serif nx-redis-q">{featured.q.title}</p>
              <div className="nx-card-actions">
                <span className="nx-redis-note">{featured.mode === "rediscover" ? "再訪は、新しい入力よりも理解を変える。" : `仮説 ${fChain ? fChain.hypothesisIds.length : 0}・発見 ${fChain ? fChain.discoveryIds.length : 0}`}</span>
                <button className="nx-btn-mini" onClick={() => onOpen(featured.q.id)}>続きを考える</button>
              </div>
            </div>
          )}

          {/* 未解決の問い / 進行中の仮説 */}
          <div className="nx-stats2">
            <button className="nx-stat-big" onClick={() => goView("discover")}>
              <span className="nx-stat-n" style={{ color: "var(--c-q)" }}>{unsolved}</span>
              <span className="nx-stat-l">未解決の問い</span>
            </button>
            <button className="nx-stat-big" onClick={() => goView("explore")}>
              <span className="nx-stat-n" style={{ color: "var(--c-h)" }}>{st.hypothesis}</span>
              <span className="nx-stat-l">進行中の仮説</span>
            </button>
          </div>

          {/* ④ 最近のテーマ */}
          <div className="nx-block">
            <p className="nx-block-l">最近のテーマ</p>
            <div className="nx-tags">
              {themes.length ? themes.map(t => <span key={t} className="nx-tag-pill static"><Hash size={11} />{t}</span>) : <span className="nx-faint">まだありません</span>}
            </div>
          </div>

          {/* ⑤ クイック作成 */}
          <button className="nx-quick" onClick={onCapture}><Plus size={16} /> 新しい問い</button>

          <p className="nx-principle">この循環に終わりはない。<br />観察 → 問い → 探求 → 発見 → 構造化 → 俯瞰 → 新しい観察…</p>
        </>
      )}
    </div>
  );
}

function CaptureView({ db, preset, onBack, onSaved, createNote }) {
  const [title, setTitle] = useState("");
  const [content, setContent] = useState("");
  const [type, setType] = useState(preset || "question");
  const [tagStr, setTagStr] = useState("");
  useEffect(() => setType(preset || "question"), [preset]);

  const parseTags = (s) => s.split(/[\s,、　]+/).map(x => x.replace(/^#/, "").trim()).filter(Boolean);

  const save = () => {
    if (!title.trim()) return;
    const id = createNote({ title: title.trim(), content: content.trim(), type, tags: parseTags(tagStr) });
    onSaved(id, type);
  };

  return (
    <div className="nx-page">
      <Topbar title="思考を記録する" onBack={onBack} />
      <label className="nx-label">タイトル</label>
      <input autoFocus className="nx-input serif lg" placeholder="例：宇宙はなぜ膨張するのか" value={title} onChange={e => setTitle(e.target.value)} />

      <label className="nx-label">種別</label>
      <div className="nx-type-grid">
        {TYPE_ORDER.map(t => { const T = TYPES_FULL[t]; const Ic = T.ic; return (
          <button key={t} className={"nx-type-b" + (type === t ? " on" : "")} style={type === t ? { borderColor: T.color, color: T.color } : {}} onClick={() => setType(t)}>
            <Ic size={15} />{T.jp}
          </button>
        ); })}
      </div>

      <label className="nx-label">タグ</label>
      <input className="nx-input" placeholder="#宇宙 #構造" value={tagStr} onChange={e => setTagStr(e.target.value)} />

      <label className="nx-label">本文</label>
      <textarea className="nx-input" rows={5} placeholder="考えていることを書く…" value={content} onChange={e => setContent(e.target.value)} />

      <button className="nx-btn-primary" disabled={!title.trim()} onClick={save}>保存する <ArrowRight size={16} /></button>
      {type === "question" && <p className="nx-faint center">保存すると Question Chain が生成され、育成を始められます。</p>}
    </div>
  );
}

/* ============================================================ EXPLORE */
function ExploreView({ db, onOpen }) {
  const [q, setQ] = useState("");
  const [tag, setTag] = useState(null);
  const themes = useMemo(() => { const m = {}; activeNotes(db).forEach(n => n.tags.forEach(t => m[t] = (m[t] || 0) + 1)); return Object.entries(m).sort((a, b) => b[1] - a[1]); }, [db]);
  const results = useMemo(() => {
    let ns = [...activeNotes(db)].sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
    if (tag) ns = ns.filter(n => n.tags.includes(tag));
    if (q.trim()) { const s = q.toLowerCase(); ns = ns.filter(n => n.title.toLowerCase().includes(s) || n.content.toLowerCase().includes(s) || n.tags.some(t => t.toLowerCase().includes(s))); }
    return ns;
  }, [db, q, tag]);

  return (
    <div className="nx-page">
      <header className="nx-head"><div><p className="nx-kicker">探す・繋げる</p><h1 className="serif nx-h1">Explore</h1></div></header>
      <div className="nx-searchbar"><Search size={16} /><input className="nx-search-i" placeholder="タイトル・本文・タグを検索…" value={q} onChange={e => setQ(e.target.value)} /></div>
      <div className="nx-tags">
        <button className={"nx-tag-pill" + (!tag ? " on" : "")} onClick={() => setTag(null)}><Hash size={11} />すべて</button>
        {themes.map(([t, n]) => <button key={t} className={"nx-tag-pill" + (tag === t ? " on" : "")} onClick={() => setTag(tag === t ? null : t)}><Hash size={11} />{t}<span className="nx-tag-n">{n}</span></button>)}
      </div>
      <div className="nx-list">
        {results.length === 0 && <p className="nx-empty">該当するメモはありません。</p>}
        {results.map(n => <NoteRow key={n.id} db={db} note={n} onOpen={onOpen} />)}
      </div>
    </div>
  );
}
/* relationCount + parentQuestionOf are imported from services/discoveryEngine.js */
/* NoteCard — polymorphic part covering Question / Hypothesis / Discovery cards */
function NoteCard({ db, note, onOpen, meta }) {
  const T = TYPES_FULL[note.type]; const Ic = T.ic;
  let sub = "";
  if (note.type === "question") sub = `${fmtDate(note.createdAt)}　関連 ${relationCount(db, note.id)}`;
  else if (note.type === "hypothesis") { const pq = parentQuestionOf(db, note.id); sub = pq ? `↳ ${trunc(pq.title, 14)}` : T.jp; }
  else if (note.type === "discovery") { const pq = parentQuestionOf(db, note.id); sub = `発見 ${fmtDate(note.createdAt)}` + (pq ? `　↳ ${trunc(pq.title, 12)}` : ""); }
  else sub = `${fmtDate(note.createdAt)}`;
  return (
    <button className="nx-list-item" onClick={() => onOpen(note.id)}>
      <span className="nx-li-ic" style={{ color: T.color }}><Ic size={15} /></span>
      <span className="nx-li-body">
        <span className="nx-li-t">{note.title}</span>
        <span className="nx-li-meta"><span style={{ color: T.color }}>{T.jp}</span>{note.tags.length ? " · " + note.tags.map(t => "#" + t).join(" ") : ""} · {sub}{meta ? " · " + meta : ""}</span>
      </span>
      <ChevronRight size={15} className="nx-li-ch" />
    </button>
  );
}
const NoteRow = NoteCard; /* alias: existing call sites */

/* tagCount + relatedTags are imported from services/discoveryEngine.js */
function ThemeCard({ db, tag, plus }) {
  const rel = relatedTags(db, tag);
  return (
    <div className="nx-theme-card">
      <div className="nx-theme-top">
        <span className="nx-theme-tag"><Hash size={13} />{tag}</span>
        <span className="nx-theme-count">{tagCount(db, tag)}{plus != null && <b className="nx-grow-plus"> +{plus}</b>}</span>
      </div>
      {rel.length > 0 && <div className="nx-theme-rel">関連：{rel.map(r => "#" + r).join("  ")}</div>}
    </div>
  );
}

/* ============================================================ DISCOVER */
function DiscoverView({ db, onOpen, linkNotes }) {
  const st = useMemo(() => statistics(db), [db]);
  const longQ = useMemo(() => [...activeNotes(db)].filter(n => n.type === "question").sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt)).slice(0, 3), [db]);
  const redis = useMemo(() => rediscoveryList(db, 3), [db]);
  const candidates = useMemo(() => relatedCandidates(db, 4), [db]);
  const major = useMemo(() => majorThemes(db, 5), [db]);
  const growth = useMemo(() => growthThemes(db), [db]);
  const wr = useMemo(() => weeklyReport(db), [db]);
  const statBars = TYPE_ORDER.slice(0, 4).map(t => ({ k: TYPES[t].jp, v: st[t], c: TYPES[t].color }));
  const maxV = Math.max(1, ...statBars.map(b => b.v));

  return (
    <div className="nx-page">
      <header className="nx-head"><div><p className="nx-kicker">発見を支援する</p><h1 className="serif nx-h1">Discover</h1></div></header>

      <div className="nx-report">
        <p className="nx-report-l">今週の思考レポート</p>
        <div className="nx-report-grid">
          {[["Question", wr.question, "var(--c-q)"], ["Hypothesis", wr.hypothesis, "var(--c-h)"], ["Discovery", wr.discovery, "var(--c-d)"], ["Conclusion", wr.conclusion, "var(--c-c)"]].map(([l, v, c]) => (
            <div className="nx-delta" key={l}><span className="nx-delta-v" style={{ color: c }}>+{v}</span><span className="nx-delta-l">{l}</span></div>
          ))}
        </div>
        <p className="nx-faint" style={{ marginTop: 10 }}>新しい関連 <b style={{ color: "var(--c-r)" }}>+{wr.links}</b>　直近7日</p>
      </div>

      {candidates.length > 0 && (
        <>
          <p className="nx-sec"><Sparkles size={12} style={{ verticalAlign: "-1px" }} /> 発見のきっかけ</p>
          <div className="nx-cands">
            {candidates.map((c, i) => (
              <div className="nx-cand" key={i}>
                <p className="nx-cand-q">この2つは、関係があるかもしれません。</p>
                <div className="nx-cand-pair">
                  <button className="nx-cand-note" onClick={() => onOpen(c.a.id)}>{trunc(c.a.title, 18)}</button>
                  <span className="nx-cand-link">↔</span>
                  <button className="nx-cand-note" onClick={() => onOpen(c.b.id)}>{trunc(c.b.title, 18)}</button>
                </div>
                <div className="nx-cand-foot">
                  <span className="nx-cand-shared">{c.shared.map(s => "#" + s).join("  ")}</span>
                  <button className="nx-btn-mini" onClick={() => linkNotes(c.a.id, c.b.id)}>つなぐ</button>
                </div>
              </div>
            ))}
          </div>
          <p className="nx-faint">提案のみ。つなぐかどうかは、あなたが決める。</p>
        </>
      )}

      <p className="nx-sec">① 再発見</p>
      <div className="nx-list">
        {redis.length ? redis.map(n => <NoteRow key={n.id} db={db} note={n} onOpen={onOpen} meta={`${daysSince(n.updatedAt)}日ぶり`} />) : <p className="nx-empty">再訪できる古いメモはまだありません。</p>}
      </div>

      <p className="nx-sec">② 長期問い</p>
      <div className="nx-list">
        {longQ.length ? longQ.map(n => (
          <button key={n.id} className="nx-long" onClick={() => onOpen(n.id)}>
            <span className="serif nx-long-t">{n.title}</span>
            <span className="nx-long-d"><b>{daysSince(n.createdAt)}</b>日</span>
          </button>
        )) : <p className="nx-empty">問いがまだありません。</p>}
      </div>

      <p className="nx-sec">③ 成長テーマ</p>
      <div className="nx-theme-cards">
        {growth.length ? growth.map(([t, n]) => <ThemeCard key={t} db={db} tag={t} plus={n} />) : <p className="nx-empty">直近{REDISCOVER_DAYS}日の動きはまだありません。</p>}
      </div>

      <p className="nx-sec">④ 主要テーマ</p>
      <div className="nx-major">
        {major.length ? major.map(([t, n], i) => (
          <div className="nx-major-row" key={t}>
            <span className="nx-major-rank">{i + 1}</span>
            <span className="nx-major-tag">#{t}</span>
            <span className="nx-major-n">{n}</span>
          </div>
        )) : <p className="nx-empty">タグがまだありません。</p>}
      </div>

      <p className="nx-sec">⑤ 思考統計</p>
      <div className="nx-bars">
        {statBars.map(b => (
          <div className="nx-bar-row" key={b.k}>
            <span className="nx-bar-l">{b.k}</span>
            <span className="nx-bar-track"><span className="nx-bar-fill" style={{ width: `${(b.v / maxV) * 100}%`, background: b.c }} /></span>
            <span className="nx-bar-v">{b.v}</span>
          </div>
        ))}
      </div>
      <p className="nx-stat-line">タグ <b>{st.tags}</b>　リンク <b>{st.links}</b>　合計 <b>{st.total}</b> ノード</p>
    </div>
  );
}

/* ============================================================ GRAPH (Alpha: tree) */
function GraphView({ db, root, setRoot, onOpen, linkSequence }) {
  const roots = useMemo(() => activeNotes(db).filter(n => n.type === "question"), [db]);
  const rootNote = root ? noteById(db, root) : roots[0];
  const cand = useMemo(() => structureCandidate(db), [db]);

  const tree = useMemo(() => {
    if (!rootNote) return null;
    const seen = new Set([rootNote.id]);
    const build = (id, depth) => {
      if (depth > 2) return [];
      return outLinks(db, id).filter(c => !seen.has(c.id)).map(c => { seen.add(c.id); return { note: c, children: build(c.id, depth + 1) }; });
    };
    return { note: rootNote, children: build(rootNote.id, 1) };
  }, [db, rootNote]);

  return (
    <div className="nx-page">
      <header className="nx-head"><div><p className="nx-kicker">構造を見る（Alpha：ツリー）</p><h1 className="serif nx-h1">Graph</h1></div></header>
      {roots.length > 1 && (
        <div className="nx-tags" style={{ marginBottom: 14 }}>
          {roots.map(r => <button key={r.id} className={"nx-tag-pill" + ((rootNote && rootNote.id === r.id) ? " on" : "")} onClick={() => setRoot(r.id)}>{r.title.slice(0, 10)}{r.title.length > 10 ? "…" : ""}</button>)}
        </div>
      )}
      {!tree ? <p className="nx-empty">問いを作ると、構造が育ち始めます。</p> : (
        <div className="nx-tree">
          <TreeNode node={tree} depth={0} last onOpen={onOpen} />
        </div>
      )}
      <div className="nx-legend">{TYPE_ORDER.map(k => <span key={k} className="nx-leg"><span className="nx-leg-d" style={{ background: TYPES_FULL[k].color }} />{TYPES_FULL[k].jp}</span>)}</div>

      {cand && (
        <div className="nx-struct">
          <p className="nx-struct-q"><Sparkles size={13} style={{ verticalAlign: "-2px" }} /> この順で、構造があるかもしれません。</p>
          <div className="nx-struct-chain">
            {cand.notes.map((n, i) => (
              <React.Fragment key={n.id}>
                <button className="nx-struct-node" onClick={() => onOpen(n.id)}>{trunc(n.title, 16)}</button>
                {i < cand.notes.length - 1 && <span className="nx-struct-arrow">↓</span>}
              </React.Fragment>
            ))}
          </div>
          <div className="nx-struct-foot">
            <span className="nx-faint">#{cand.tag}・提案のみ。決めるのはあなた。</span>
            <button className="nx-btn-mini" onClick={() => linkSequence(cand.notes.map(n => n.id))}>この構造でつなぐ</button>
          </div>
        </div>
      )}
    </div>
  );
}
function TreeNode({ node, depth, onOpen }) {
  const T = TYPES_FULL[node.note.type]; const Ic = T.ic;
  return (
    <div className="nx-tnode">
      <button className="nx-trow" style={{ paddingLeft: depth * 18 }} onClick={() => onOpen(node.note.id)}>
        {depth > 0 && <span className="nx-tbranch">{depth === 1 ? "├" : "└"}</span>}
        <span className="nx-tdot" style={{ background: T.color }} />
        <Ic size={13} style={{ color: T.color, flexShrink: 0 }} />
        <span className="nx-trow-t">{node.note.title}</span>
      </button>
      {node.children.map(c => <TreeNode key={c.note.id} node={c} depth={depth + 1} onOpen={onOpen} />)}
    </div>
  );
}

/* ============================================================ NOTE DETAIL */
function DetailView({ db, id, onBack, onOpen, growChain, addReference, addDiscoveryConcept, createNote, linkNotes, setNoteStatus }) {
  const note = noteById(db, id);
  const [composerType, setComposerType] = useState("hypothesis");
  const [draft, setDraft] = useState("");
  const [nexus, setNexus] = useState(null);
  const [busy, setBusy] = useState(false);
  const [evFor, setEvFor] = useState(null);
  const [evDraft, setEvDraft] = useState("");
  const [menu, setMenu] = useState(false);

  if (!note) return <div className="nx-page"><Topbar title="思考" onBack={onBack} /><p className="nx-empty">見つかりません。</p></div>;
  const T = TYPES_FULL[note.type]; const Ic = T.ic;
  const isQ = note.type === "question";
  const chain = isQ ? chainOf(db, note.id) : null;
  const related = relatedByTag(db, note).concat(outLinks(db, note.id).filter(n => !relatedByTag(db, note).some(r => r.id === n.id)));
  const bls = backLinks(db, note.id);

  const consult = async () => { setBusy(true); const frags = outLinks(db, note.id).map(n => n.title).slice(-6); setNexus(await askNexus(note.title, frags)); setBusy(false); };

  const submit = () => {
    if (!draft.trim()) return;
    if (composerType === "hypothesis") { const hid = growChain(note.id, "hypothesis", { title: draft.trim() }); setEvFor(hid); }
    else growChain(note.id, composerType, { title: draft.trim() });
    setDraft("");
  };
  const submitEv = () => { if (evDraft.trim() && evFor) { addReference(evFor, evDraft.trim()); setEvDraft(""); setEvFor(null); } };

  const chainNotes = chain ? {
    hyp: chain.hypothesisIds.map(i => noteById(db, i)).filter(Boolean),
    dis: chain.discoveryIds.map(i => noteById(db, i)).filter(Boolean),
    con: chain.conclusionIds.map(i => noteById(db, i)).filter(Boolean),
  } : null;

  return (
    <div className="nx-page">
      <div className="nx-topbar">
        <button className="nx-back" onClick={onBack}><ArrowLeft size={18} /></button>
        <span className="nx-topbar-t">{T.jp}</span>
        <button className="nx-icon" style={{ marginLeft: "auto" }} onClick={() => setMenu(m => !m)}>⋯</button>
      </div>
      {menu && (
        <div className="nx-menu">
          <button onClick={() => { setNoteStatus(note.id, note.status === "archived" ? "active" : "archived"); setMenu(false); }}><Archive size={14} />{note.status === "archived" ? "復元" : "保管(archive)"}</button>
          <button className="danger" onClick={() => { setNoteStatus(note.id, "deleted"); setMenu(false); onBack(); }}><Trash2 size={14} />ゴミ箱へ</button>
        </div>
      )}

      <div className="nx-detail-head" style={{ borderColor: T.color }}>
        <span className="nx-tag" style={{ color: T.color }}><Ic size={13} /> {T.jp}{isQ && chain && chain.conclusionIds.length === 0 ? `・${daysSince(note.createdAt)}日 未解決` : ""}</span>
        <h2 className="serif nx-detail-t">{note.title}</h2>
        {note.tags.length > 0 && <div className="nx-tags sm">{note.tags.map(t => <span key={t} className="nx-tag-pill static"><Hash size={11} />{t}</span>)}</div>}
        {note.content && <p className="nx-detail-body">{note.content}</p>}
      </div>

      {/* Question Chain */}
      {isQ && (
        <div className="nx-chainbox">
          <div className="nx-chain-head">
            <p className="nx-sec" style={{ margin: "4px 0 0" }}>Question Chain</p>
            <div className="nx-maturity">
              <span className="nx-maturity-l">成熟度</span>
              <span className="nx-maturity-bar"><span style={{ width: `${maturity(db, note.id)}%` }} /></span>
              <span className="nx-maturity-v">{maturity(db, note.id)}%</span>
            </div>
          </div>
          <ChainStep label="Question" color="var(--c-q)" items={[note]} onOpen={onOpen} active />
          <ChainStep label="Hypothesis" color="var(--c-h)" items={chainNotes.hyp} onOpen={onOpen} ev={{ evFor, evDraft, setEvDraft, submitEv, setEvFor }} db={db} />
          <ChainStep label="Discovery" color="var(--c-d)" items={chainNotes.dis} onOpen={onOpen} />
          <ChainStep label="Conclusion" color="var(--c-c)" items={chainNotes.con} onOpen={onOpen} />

          {/* composer */}
          <div className="nx-composer">
            <div className="nx-comp-types">
              {["hypothesis", "discovery", "conclusion"].map(t => <button key={t} className={"nx-comp-b" + (composerType === t ? " on" : "")} style={composerType === t ? { color: TYPES_FULL[t].color, borderColor: TYPES_FULL[t].color } : {}} onClick={() => setComposerType(t)}>{TYPES_FULL[t].jp}を追加</button>)}
            </div>
            <textarea className="nx-input serif" rows={2} placeholder={`新しい${TYPES_FULL[composerType].jp}を書く…`} value={draft} onChange={e => setDraft(e.target.value)} />
            <button className="nx-btn-primary sm" disabled={!draft.trim()} onClick={submit}>記録 <ArrowRight size={14} /></button>
            {composerType === "conclusion" && <p className="nx-faint">結論は終わりではない。Nexusが次の問いを促します。</p>}
          </div>

          {/* Nexus */}
          <div className="nx-nexus">
            <div className="nx-nexus-head"><span className="nx-nexus-orb" /> <b>Nexus</b><span className="nx-nexus-sub">観察補助者</span></div>
            {!nexus && !busy && <button className="nx-btn-ghost wide" onClick={consult}><Sparkles size={15} /> 見落とした関係を尋ねる</button>}
            {busy && <p className="nx-nexus-think">観測しています…</p>}
            {nexus && !busy && (
              <div className="nx-nexus-body">
                <p className="serif nx-nexus-q">{nexus.followup}</p>
                {nexus.note && <p className="nx-nexus-note">{nexus.note}</p>}
                {nexus.relations?.length > 0 && (
                  <div className="nx-rel"><span className="nx-rel-l">関連して見えるもの：</span>
                    {nexus.relations.map(r => <button key={r} className="nx-rel-chip" onClick={() => addDiscoveryConcept(note.id, r)}><Plus size={11} /> {r}</button>)}
                  </div>
                )}
                <button className="nx-btn-text" onClick={consult}>別の角度から</button>
              </div>
            )}
            <p className="nx-nexus-foot">Nexusは答えを与えない。問いを広げる。</p>
          </div>
        </div>
      )}

      {/* 関連メモ / バックリンク */}
      <p className="nx-sec">関連メモ</p>
      <div className="nx-list">{related.length ? related.slice(0, 8).map(n => <NoteRow key={n.id} db={db} note={n} onOpen={onOpen} />) : <p className="nx-empty">同じタグ・リンクのメモはまだありません。</p>}</div>

      <p className="nx-sec"><Link2 size={13} style={{ verticalAlign: "-2px" }} /> バックリンク</p>
      <div className="nx-list">{bls.length ? bls.map(n => <NoteRow key={n.id} db={db} note={n} onOpen={onOpen} />) : <p className="nx-empty">まだ参照されていません。</p>}</div>
    </div>
  );
}
function ChainStep({ label, color, items, onOpen, active, ev, db }) {
  return (
    <div className="nx-cstep">
      <div className="nx-cstep-head"><span className="nx-cdot" style={{ background: color }} /><span className="nx-cstep-l" style={{ color }}>{label}</span><span className="nx-cstep-n">{items.length}</span></div>
      <div className="nx-cstep-items">
        {items.map(n => (
          <div key={n.id} className="nx-cstep-wrap">
            <button className="nx-cstep-i" onClick={() => onOpen(n.id)}><CornerDownRight size={12} /> {n.title}</button>
            {ev && ev.evFor === n.id && (
              <div className="nx-ev">
                <p className="nx-ev-ask"><Sparkles size={12} /> この仮説を裏付ける根拠はありますか？</p>
                <div className="nx-inline">
                  <input className="nx-input" placeholder="参考資料（例：相対性理論）" value={ev.evDraft} onChange={e => ev.setEvDraft(e.target.value)} onKeyDown={e => e.key === "Enter" && ev.submitEv()} />
                  <button className="nx-btn-mini" onClick={ev.submitEv}>追加</button>
                  <button className="nx-btn-mini ghost" onClick={() => ev.setEvFor(null)}>後で</button>
                </div>
              </div>
            )}
          </div>
        ))}
        {items.length === 0 && <span className="nx-cstep-empty">—</span>}
      </div>
    </div>
  );
}

function Starfield({ show }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!show) return;
    const c = ref.current; if (!c) return; const ctx = c.getContext("2d");
    let raf, stars = [];
    const resize = () => { c.width = c.offsetWidth; c.height = c.offsetHeight; const n = Math.floor((c.width * c.height) / 9000); stars = Array.from({ length: n }, () => ({ x: Math.random() * c.width, y: Math.random() * c.height, r: Math.random() * 1.3 + 0.2, p: Math.random() * 7, s: Math.random() * 0.018 + 0.004 })); };
    resize(); window.addEventListener("resize", resize);
    const draw = () => { ctx.clearRect(0, 0, c.width, c.height); stars.forEach(st => { st.p += st.s; const a = 0.25 + Math.sin(st.p) * 0.25; ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, 7); ctx.fillStyle = `rgba(220,225,240,${a})`; ctx.fill(); }); raf = requestAnimationFrame(draw); };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, [show]);
  if (!show) return null;
  return <canvas ref={ref} className="nx-stars" />;
}

/* discover */

.nx-long-t{ font-size:16px; line-height:1.4; } .nx-long-d{ font-size:12px; color:var(--ink-dim); white-space:nowrap; } .nx-long-d b{ font-family:'Shippori Mincho B1',serif; font-size:24px; color:var(--c-q); }

.nx-seg{ display:flex; gap:8px; }

/* STEP4: observation / continue / report */

/* Engine 1: 発見のきっかけ */

.nx-nav-b.on{ color:var(--accent); } .nx-nav-b:hover{ color:var(--ink-dim); }
